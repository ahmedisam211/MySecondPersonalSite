<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | My Website</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111111;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }
        
        .content {
            max-width: 600px;
            padding: 20px;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: -0.05rem;
        }
        
        p {
            font-size: 1.2rem;
            color: #888888;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .cool-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.5rem;
            position: relative;
            padding-bottom: 5px;
            display: inline-block;
        }
        
        .cool-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: currentColor;
            transition: width 0.3s ease;
        }
        
        .cool-link:hover::after {
            width: 100%;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 50px;
            color: #555555;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: #ffffff;
        }
    </style>
</head>

<body>
    <div class="content">
        <h1>Let's talk.</h1>
        <p>I'm always open to interesting conversations and new projects.</p>

        <div class="social-links">
            <a href="mailto:ahmdsamth@gmail.com" class="cool-link">Email</a>
            <a href="https://github.com/ahmedisam211" target="_blank" class="cool-link">GitHub</a>
            <a href="https://twitter.com/yourusername" target="_blank" class="cool-link">instagram</a>
        </div>

        <a href="/" class="back-link">← Back to the homepage</a>
    </div>
</body>

</html>
