<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>title=Home</title>
    <style>
        /* This section handles the background and centers the text */
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111111;
            /* Deep dark gray/black background */
            color: #ffffff;
            /* White text */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }
        /* This keeps your text neat and readable */
        
        .content {
            max-width: 600px;
            padding: 20px;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: -0.05rem;
        }
        
        p {
            font-size: 1.2rem;
            color: #888888;
            /* Softer gray text for the subtitle */
            line-height: 1.5;
        }
        /* The animation keyframes */
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Apply it to your content */
        
        .content {
            animation: fadeInUp 1s ease-out forwards;
        }
        /* Optional: Make the paragraph fade in slightly after the heading */
        
        p {
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
            /* The 0.5s is a delay */
        }
    </style>
</head>

<body>

    <div class="content">
        <h1>Hello, I'm Ahmed.</h1>
        <p>Welcome to my corner of the internet. More coming soon.</p>
    </div>

</body>

</html>
