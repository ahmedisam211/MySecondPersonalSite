<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Website</title>
    <style>
        /* This section handles the background and centers the text */
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111111;
            /* Deep dark gray/black background */
            color: #ffffff;
            /* White text */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }
        /* This keeps your text neat and readable */
        
        .content {
            max-width: 600px;
            padding: 20px;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: -0.05rem;
        }
        
        p {
            font-size: 1.2rem;
            color: #888888;
            /* Softer gray text for the subtitle */
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <div class="content">
        <h1>Hello, I'm [Your Name].</h1>
        <p>Welcome to my minimalist corner of the internet. More coming soon.</p>
    </div>

</body>

</html>
